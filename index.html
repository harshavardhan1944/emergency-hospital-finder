<!DOCTYPE html>
<html>
<head>
  <title>Emergency Hospital Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<div class="bg-red-600 text-white p-6">
  <h1 class="text-2xl font-bold">🚑 Emergency Hospital Finder</h1>
  <p class="text-sm">AI triage - Find the right hospital fast</p>

  <div class="mt-4 flex gap-2">
    <button class="bg-red-800 px-4 py-2 rounded">Critical</button>
    <button class="bg-red-800 px-4 py-2 rounded">Urgent</button>
    <button class="bg-red-800 px-4 py-2 rounded">Moderate</button>
  </div>
</div>

<!-- INPUT -->
<div class="p-6">

  <label class="block text-gray-600 mb-2">Describe the emergency</label>

  <div class="flex gap-2">
    <input id="input"
      class="w-full p-3 border rounded"
      placeholder="e.g. Chest pain, pregnancy emergency...">

    <button onclick="startVoice()" class="bg-gray-200 px-4 rounded">🎤</button>
  </div>

  <!-- QUICK BUTTONS -->
  <div class="mt-4 flex flex-wrap gap-2">
    <button onclick="quickFill('Chest pain')" class="bg-white border px-3 py-2 rounded">Chest pain</button>
    <button onclick="quickFill('Pregnancy emergency')" class="bg-white border px-3 py-2 rounded">Pregnancy</button>
    <button onclick="quickFill('Child seizure')" class="bg-white border px-3 py-2 rounded">Child seizure</button>
    <button onclick="quickFill('Stroke signs')" class="bg-white border px-3 py-2 rounded">Stroke</button>
  </div>

  <!-- FIND BUTTON -->
  <button onclick="findHospital()"
    class="mt-6 w-full bg-gray-800 text-white p-3 rounded">
    Find Right Hospital
  </button>

</div>

<!-- RESULTS -->
<div id="result" class="p-6 space-y-4"></div>

<!-- FOOTER -->
<div class="fixed bottom-0 w-full bg-white border-t p-3 text-center">
  🚨 Emergency: 108 | 112
</div>

<script>
// voice
function startVoice(){
  const recognition = new webkitSpeechRecognition();
  recognition.start();

  recognition.onresult = function(event){
    document.getElementById("input").value =
      event.results[0][0].transcript;
  }
}

// quick fill
function quickFill(text){
  document.getElementById("input").value = text;
}

// main
async function findHospital(){

  let text = document.getElementById("input").value;

  let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_API_KEY",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "openai/gpt-3.5-turbo",
      messages: [{
        role: "user",
        content: `
You are a medical triage assistant.

Input: ${text}

Return JSON:
{
 "severity": "Critical/Urgent/Moderate",
 "facilities": ["ICU", "Cardiology"],
 "reason": "short"
}
`
      }]
    })
  });

  let data = await res.json();

  let output = data.choices?.[0]?.message?.content || "No response";

  document.getElementById("result").innerHTML = `
  
  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-bold text-lg">🧠 AI Analysis</h3>
    <p class="text-sm text-gray-600">${output}</p>
  </div>

  ${hospitalCard("Apollo Hospital", "2 km", "5 min")}
  ${hospitalCard("Yashoda Hospital", "3 km", "8 min")}
  ${hospitalCard("KIMS Hospital", "4 km", "10 min")}
  `;
}

// hospital card
function hospitalCard(name, distance, time){
  return `
  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-bold">${name}</h3>
    <p class="text-sm text-gray-600">📍 ${distance} | ⏱️ ${time}</p>

    <div class="mt-2 flex gap-2">
      <a href="tel:+918040000000"
        class="bg-green-500 text-white px-3 py-1 rounded">Call</a>

      <a href="https://www.google.com/maps"
        class="bg-blue-500 text-white px-3 py-1 rounded">Navigate</a>
    </div>
  </div>
  `;
}
</script>

</body>
</html>
