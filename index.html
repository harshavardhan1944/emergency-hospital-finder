<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediRoute</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans">

<div class="max-w-md mx-auto p-5">

<h1 class="text-2xl font-bold mb-2">🚑 MediRoute</h1>
<p class="text-gray-400 mb-4">AI Emergency Hospital Finder</p>

<input id="input" class="w-full p-3 rounded text-black mb-3"
placeholder="Describe emergency...">

<button onclick="findHospital()"
class="w-full bg-red-500 p-3 rounded font-bold">
Find Right Hospital
</button>

<div id="result" class="mt-5 space-y-3"></div>

</div>

<script>

// 🔴 PASTE YOUR KEY HERE
const API_KEY = "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";

// 📍 Get location
let userLat = null, userLon = null;

navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
});

// 🧠 AI
async function getAI(text){

  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "mistralai/mistral-7b-instruct",
      messages: [
        {
          role: "user",
          content: `Classify emergency: ${text}`
        }
      ]
    })
  });

  const data = await res.json();
  return data.choices?.[0]?.message?.content || "No AI response";
}

// 🏥 hospitals
async function getHospitals(lat, lon){

  const query = `
  [out:json];
  node["amenity"="hospital"](around:5000,${lat},${lon});
  out;
  `;

  const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);
  const res = await fetch(url);
  const data = await res.json();

  return data.elements.slice(0,3);
}

// 🚑 MAIN
async function findHospital(){

  let text = document.getElementById("input").value;

  if(!userLat){
    alert("Allow location first");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Loading...";

  let ai = await getAI(text);
  let hospitals = await getHospitals(userLat, userLon);

  let html = `
  <div class="bg-gray-800 p-3 rounded">
    <b>🧠 AI:</b> ${ai}
  </div>
  `;

  hospitals.forEach(h => {
    html += `
    <div class="bg-gray-800 p-3 rounded">
      <b>${h.tags.name || "Hospital"}</b><br>
      <a href="https://www.google.com/maps?q=${h.lat},${h.lon}" target="_blank">
        Navigate
      </a>
    </div>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
