<!DOCTYPE html>
<html>
<head>
  <title>Emergency Hospital Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<div class="bg-red-600 p-5 text-white">
  <h1 class="text-2xl font-bold">🚑 Emergency Finder</h1>
  <p class="text-sm opacity-80">Find the right hospital in seconds</p>
</div>

<!-- SEARCH -->
<div class="p-4">

  <div class="bg-white p-3 rounded-xl shadow flex items-center gap-2">
    <input id="input"
      class="w-full outline-none"
      placeholder="Describe emergency (e.g. chest pain...)">

    <button onclick="startVoice()">🎤</button>
  </div>

  <!-- QUICK TAGS -->
  <div class="flex gap-2 mt-3 flex-wrap">
    <button onclick="quickFill('Chest pain')" class="bg-white px-3 py-1 rounded-full shadow text-sm">Chest pain</button>
    <button onclick="quickFill('Pregnancy emergency')" class="bg-white px-3 py-1 rounded-full shadow text-sm">Pregnancy</button>
    <button onclick="quickFill('Stroke signs')" class="bg-white px-3 py-1 rounded-full shadow text-sm">Stroke</button>
  </div>

  <!-- BUTTON -->
  <button onclick="findHospital()"
    class="mt-4 w-full bg-red-600 text-white p-3 rounded-xl font-semibold">
    Find Best Hospitals
  </button>

</div>

<!-- RESULTS -->
<div id="result" class="p-4 space-y-4"></div>

<!-- FOOTER -->
<div class="fixed bottom-0 w-full bg-white border-t p-3 text-center text-sm">
  🚨 Emergency: 108 | 112
</div>

<script>

// 🎤 Voice
function startVoice(){
  const recognition = new webkitSpeechRecognition();
  recognition.start();

  recognition.onresult = function(event){
    document.getElementById("input").value =
      event.results[0][0].transcript;
  }
}

// Quick fill
function quickFill(text){
  document.getElementById("input").value = text;
}

// MAIN FUNCTION
async function findHospital(){

  let text = document.getElementById("input").value;

  document.getElementById("result").innerHTML = `
    <p class="text-center text-gray-500">🔍 Finding best hospitals...</p>
  `;

  let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_API_KEY",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "openai/gpt-3.5-turbo",
      messages: [{
        role: "user",
        content: `
You are a medical triage assistant.

Input: ${text}

Return JSON:
{
 "severity": "Critical/Urgent/Moderate",
 "facilities": ["ICU", "Cardiology"],
 "reason": "short"
}
`
      }]
    })
  });

  let data = await res.json();

  let output = data.choices?.[0]?.message?.content || "No response";

  document.getElementById("result").innerHTML = `
    
    <!-- AI RESULT -->
    <div class="bg-white p-4 rounded-xl shadow">
      <h3 class="font-bold text-lg">🧠 AI Triage</h3>
      <p class="text-sm text-gray-600">${output}</p>
    </div>

    ${hospitalCard("Apollo Hospital", "92%", "2 km", "5 min", "red")}
    ${hospitalCard("Yashoda Hospital", "87%", "3 km", "8 min", "yellow")}
    ${hospitalCard("KIMS Hospital", "81%", "4 km", "10 min", "green")}
  `;
}

// CARD UI
function hospitalCard(name, match, distance, time, color){

  let badgeColor = {
    red: "bg-red-500",
    yellow: "bg-yellow-400",
    green: "bg-green-500"
  }

  return `
  <div class="bg-white rounded-xl shadow p-4">

    <div class="flex justify-between items-center">
      <h3 class="font-bold text-lg">${name}</h3>
      <span class="${badgeColor[color]} text-white text-xs px-2 py-1 rounded">
        ${match} Match
      </span>
    </div>

    <p class="text-sm text-gray-500 mt-1">
      📍 ${distance} • ⏱️ ${time}
    </p>

    <div class="flex gap-2 mt-3">
      <a href="tel:+918040000000"
        class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg">
        📞 Call
      </a>

      <a href="https://www.google.com/maps"
        class="flex-1 bg-blue-500 text-white text-center py-2 rounded-lg">
        🗺️ Navigate
      </a>
    </div>

  </div>
  `;
}

</script>

</body>
</html>
